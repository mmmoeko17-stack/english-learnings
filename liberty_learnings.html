let currentFilter = 'all';

function buildHTML(lessons) {
  const container = document.getElementById('lessons-container');
  container.innerHTML = '';
  let shown = 0;
  lessons.forEach(lesson => {
    // Filter
    if (currentFilter !== 'all') {
      const hasTag = lesson.topics.some(t => t.tags.includes(currentFilter));
      if (!hasTag) return;
    }
    shown++;
    const card = document.createElement('div');
    card.className = 'lesson-card' + (lesson.num === lessons[lessons.length-1].num ? ' open' : '');
    card.dataset.num = lesson.num;

    const topicsHTML = lesson.topics.map(topic => {
      if (currentFilter !== 'all' && !topic.tags.includes(currentFilter)) return '';
      const pointsHTML = topic.points.map(p => {
        if (currentFilter !== 'all' && !p.tags.some(t => t === currentFilter)) return '';
        return `<div class="point"><span class="point-bullet">›</span><span>${p.text}</span></div>`;
      }).join('');
      if (!pointsHTML.trim()) return '';
      return `
        <div class="topic-section">
          <div class="topic-title">
            <span class="topic-dot" style="background:${topic.color}"></span>
            ${topic.title}
          </div>
          ${pointsHTML}
        </div>`;
    }).join('');

    card.innerHTML = `
      <div class="lesson-header" onclick="toggleCard(this)">
        <div class="lesson-meta">
          <span class="lesson-num">第${lesson.num}回</span>
          <div>
            <div class="lesson-title">${lesson.title}</div>
            <div class="lesson-date">${lesson.date}</div>
          </div>
        </div>
        <span class="lesson-toggle">▼</span>
      </div>
      <div class="lesson-body">
        ${lesson.caution ? `<div class="note-caution">⚠️ ${lesson.caution}</div><br>` : ''}
        ${topicsHTML || '<div style="color:var(--muted);font-size:0.85rem;">このフィルターに該当するメモがありません</div>'}
      </div>`;
    container.appendChild(card);
  });
  document.getElementById('no-results').style.display = shown === 0 ? 'block' : 'none';
}

function toggleCard(header) {
  header.parentElement.classList.toggle('open');
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  buildHTML(LESSONS);
}

function doSearch() {
  const q = document.getElementById('search').value.toLowerCase();
  if (!q) { buildHTML(LESSONS); return; }
  const filtered = LESSONS.filter(lesson =>
    lesson.title.toLowerCase().includes(q) ||
    lesson.topics.some(t =>
      t.title.toLowerCase().includes(q) ||
      t.points.some(p => p.text.toLowerCase().includes(q))
    )
  );
  buildHTML(filtered);
}

buildHTML(LESSONS);
</script>
